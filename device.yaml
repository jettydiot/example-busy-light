# Busy Light — AI-powered meeting indicator
# https://github.com/jettydiot/example-busy-light

jettyd:
  fleet_token: "ft_YOUR_TOKEN_HERE"
  mqtt_uri: "mqtt://mqtt.jettyd.com:1883"

wifi:
  ssid: "YourNetworkName"
  password: "YourNetworkPassword"

name: "busy-light"
version: "1.0.0"
target: "esp32c3"        # C3 is the cheapest option for this

drivers:
  - name: led
    instance: "red"
    config:
      pin: 3
      active_high: true

  - name: led
    instance: "green"
    config:
      pin: 4
      active_high: true

  - name: led
    instance: "amber"
    config:
      pin: 5
      active_high: true

defaults:
  heartbeat_interval: 60
  report_metrics:
    - "system.rssi"
    - "system.connected"
